[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hanzo-studio-workflow-templates-media-video"
version = "0.3.51"
description = "Media bundle containing video workflow assets"
readme = {text = "Media bundle containing video workflow assets for Hanzo Studio.", content-type = "text/plain"}
requires-python = ">=3.9"
license = "MIT"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
hanzo_studio_workflow_templates_media_video = ["templates/*"]
